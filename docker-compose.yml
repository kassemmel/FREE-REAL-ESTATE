services:
  ollama:
    container_name: bleepbloopbot-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - internal

  backend:
    container_name: bleepbloopbot-backend
    build: ./backend
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      # --- Azure AI Foundry / Azure OpenAI --- (values from .env; leave blank to disable)
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENTS=${AZURE_OPENAI_DEPLOYMENTS:-}
      # --- Portkey AI gateway --- (values from .env; leave PORTKEY_MODELS blank to disable)
      - PORTKEY_BASE_URL=${PORTKEY_BASE_URL:-https://api.portkey.ai/v1}
      - PORTKEY_API_KEY=${PORTKEY_API_KEY:-}
      - PORTKEY_VIRTUAL_KEY=${PORTKEY_VIRTUAL_KEY:-}
      - PORTKEY_PROVIDER=${PORTKEY_PROVIDER:-}
      - PORTKEY_CONFIG=${PORTKEY_CONFIG:-}
      - PORTKEY_MODELS=${PORTKEY_MODELS:-}
      # --- Prisma AIRS ---
      # Set your API key and profile name. Leave blank to disable scanning.
      - PRISMA_AIRS_API_KEY=${PRISMA_AIRS_API_KEY:-}
      - PRISMA_AIRS_PROFILE=${PRISMA_AIRS_PROFILE:-}
      # Change region if needed: https://service-de / service-in / service-sg
      - PRISMA_AIRS_URL=${PRISMA_AIRS_URL:-https://service.api.aisecurity.paloaltonetworks.com}
    volumes:
      - prompts_data:/app/data
    depends_on:
      - ollama
    networks:
      - internal

  n8n:
    container_name: bleepbloopbot-n8n
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    # Published so the external Caddy reverse proxy (on another host) can reach
    # it at http://<this-host>:5678. TLS is terminated by Caddy.
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.demo-networks.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=false
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.demo-networks.com/
      - N8N_EDITOR_BASE_URL=https://n8n.demo-networks.com/
      # Caddy is the single reverse-proxy hop in front of n8n.
      - N8N_PROXY_HOPS=1
      - N8N_RUNNERS_ENABLED=true
      # Required to use the MCP Client node as a tool under an AI Agent node.
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal

  stocks-mcp:
    container_name: bleepbloopbot-stocks-mcp
    build: ./stocks-mcp
    restart: unless-stopped
    # Published so the external Caddy reverse proxy (on another host) can reach
    # it at http://<this-host>:8077 and front it as stocks-mcp.demo-networks.com.
    # Portkey's MCP Gateway is the only intended caller (it injects the upstream
    # bearer secret Caddy enforces).
    ports:
      - "8077:8000"
    networks:
      - internal

  web:
    container_name: bleepbloopbot-web
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3131:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  ollama_data:
  prompts_data:
  n8n_data:
