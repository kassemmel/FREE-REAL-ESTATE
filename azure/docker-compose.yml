services:
  ollama:
    container_name: bleepbloopbot-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # This VM is CPU-only. For a GPU VM size, install the NVIDIA container
    # toolkit on the host and uncomment the deploy block below.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - internal

  backend:
    container_name: bleepbloopbot-backend
    build: ./backend
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      # --- Azure AI Foundry / Azure OpenAI --- (values from .env; leave blank to disable)
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENTS=${AZURE_OPENAI_DEPLOYMENTS:-}
      # --- Portkey AI gateway --- (values from .env; leave PORTKEY_MODELS blank to disable)
      - PORTKEY_BASE_URL=${PORTKEY_BASE_URL:-https://api.portkey.ai/v1}
      - PORTKEY_API_KEY=${PORTKEY_API_KEY:-}
      - PORTKEY_VIRTUAL_KEY=${PORTKEY_VIRTUAL_KEY:-}
      - PORTKEY_PROVIDER=${PORTKEY_PROVIDER:-}
      - PORTKEY_CONFIG=${PORTKEY_CONFIG:-}
      - PORTKEY_MODELS=${PORTKEY_MODELS:-}
      # --- Prisma AIRS --- (values come from /home/jkwisda/azure/.env)
      - PRISMA_AIRS_API_KEY=${PRISMA_AIRS_API_KEY:-}
      - PRISMA_AIRS_PROFILE=${PRISMA_AIRS_PROFILE:-}
      - PRISMA_AIRS_URL=${PRISMA_AIRS_URL:-https://service.api.aisecurity.paloaltonetworks.com}
    volumes:
      - prompts_data:/app/data
    depends_on:
      - ollama
    networks:
      - internal

  web:
    container_name: bleepbloopbot-web
    image: nginx:alpine
    restart: unless-stopped
    # nginx is the public edge. Port 80 = ACME challenge + redirect, 443 = TLS.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Shared with the certbot service: certs in conf/, ACME webroot in www/.
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - internal
    # Reload every 6h so a renewed cert is picked up without a manual restart.
    command: /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'

  # Manual / one-shot certbot. Keeps the image's default `certbot` entrypoint so
  # subcommands pass straight through, e.g. first issuance:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     -d demo-networks.com --email kassemmel@protonmail.com --agree-tos --no-eff-email
  # `profiles` keeps it from starting on `up` (an arg-less certbot would just exit);
  # `docker compose run` starts it regardless of the profile.
  certbot:
    container_name: bleepbloopbot-certbot
    image: certbot/certbot
    profiles: ["tools"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # Long-running auto-renewal loop (started by `up`). The shell entrypoint is why
  # this one can't also serve the manual `certonly` command above.
  certbot-renew:
    container_name: bleepbloopbot-certbot-renew
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Try renewal twice a day; certbot no-ops until the cert is ~30 days to expiry.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

networks:
  internal:
    driver: bridge

volumes:
  ollama_data:
  prompts_data:
