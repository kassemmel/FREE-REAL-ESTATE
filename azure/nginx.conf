# nginx is the public edge for the AIRS app on Azure.
#
# This is the BOOTSTRAP config (port 80 only). Use it to obtain the first
# Let's Encrypt cert. Once the cert exists, copy nginx.conf.https over this
# file to enable TLS:
#
#   cd /home/jkwisda/azure && cp nginx.conf.https nginx.conf && docker compose restart web
#
# SECURITY: This is your second IP allowlist (the first is the Azure NSG).
# Add one `allow` line per permitted IP/CIDR in the geo block below. The ACL is
# enforced per-location so the /.well-known/acme-challenge/ path stays public
# (Let's Encrypt validates from unpredictable IPs and must reach it).
# Edit this file on the VM at /home/jkwisda/azure/nginx.conf and run:
#   cd /home/jkwisda/azure && docker compose restart web

geo $allowed {
    default 0;

    # --- Permitted IPs: add your own below (one per line) ---
    # 203.0.113.5     1;       # home
    # 198.51.100.0/24 1;       # office range
    # --------------------------------------------------------
}

server {
    listen 80;
    server_name _;

    # PUBLIC: required for the Let's Encrypt HTTP-01 challenge. Not ACL-gated.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        if ($allowed = 0) { return 403; }
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        if ($allowed = 0) { return 403; }

        # Resolve the backend hostname at request-time via Docker's embedded DNS
        # (127.0.0.11) instead of at startup. Without this, nginx does a one-shot
        # lookup when it boots and dies with "host not found in upstream" if the
        # backend container isn't up yet. Using a variable forces the deferred path.
        resolver 127.0.0.11 valid=10s;
        set $airs_backend backend;
        # No URI part here on purpose: with a variable in proxy_pass, nginx does
        # NOT do location-prefix replacement, so we let the original request URI
        # (/api/...) pass through unchanged to the backend, which serves /api/* .
        proxy_pass http://$airs_backend:5000;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_read_timeout 360s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 360s;
    }
}
